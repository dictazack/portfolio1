global:
  scrape_interval: 15s        # Fréquence de collecte des métriques
  evaluation_interval: 15s    # Fréquence d'évaluation des règles d'alerte

scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Métriques système du VPS (CPU, RAM, Disque, Réseau)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Métriques des conteneurs Docker
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
